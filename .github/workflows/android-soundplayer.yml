name: Android Sound Player CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build Android Sound Player
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: AndroidSoundPlayer

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    - name: Show project structure
      run: |
        echo "Project root:"
        ls -la
        echo "App directory:"
        ls -la app/

    - name: Regenerate Gradle wrapper
      run: gradle wrapper --gradle-version 8.2 --distribution-type bin

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon --stacktrace

    - name: List build outputs
      if: always()
      run: ls -laR app/build/outputs/apk/ || echo "No APKs found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: soundplayer-debug-apk
        path: AndroidSoundPlayer/app/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: warn
