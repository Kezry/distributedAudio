name: Android Controller CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build Android Controller
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x AndroidController/gradlew

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches/
          ~/.gradle/wrapper/
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Validate Gradle wrapper
      run: |
        cd AndroidController
        ls -la gradle/wrapper/
        cat gradle/wrapper/gradle-wrapper.properties

    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses || true

    - name: Build Debug APK
      run: |
        cd AndroidController
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Check build outputs
      run: |
        cd AndroidController
        ls -laR app/build/outputs/apk/ || echo "No APKs found"

    - name: Upload APK if exists
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: controller-debug-apk
        path: AndroidController/app/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: warn
