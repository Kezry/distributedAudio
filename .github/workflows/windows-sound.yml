name: Windows Sound CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build Windows Sound
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: |
        cd WindowsSound
        dotnet restore
      continue-on-error: true

    - name: Check project structure
      run: |
        echo "Checking WindowsSound project structure..."
        cd WindowsSound
        if (Test-Path "WindowsSound.csproj") {
            echo "WindowsSound.csproj found"
        } else {
            echo "WindowsSound.csproj not found"
            exit 1
        }

    - name: Build
      run: |
        cd WindowsSound
        dotnet build --configuration Release --no-restore
      continue-on-error: true

    - name: Publish (if build succeeded)
      if: success()
      run: |
        cd WindowsSound
        dotnet publish -c Release -o ./publish --self-contained true -r win-x64

    - name: Upload artifact if exists
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: windows-sound-publish
        path: WindowsSound/publish/
        retention-days: 30
        if-no-files-found: ignore
