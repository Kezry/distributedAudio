name: Windows Sound CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build Windows Sound
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: |
        cd WindowsSound
        dotnet restore

    - name: Build Release
      run: |
        cd WindowsSound
        dotnet build --configuration Release --no-restore

    - name: Publish (self-contained, multi-file)
      run: |
        cd WindowsSound
        dotnet publish -c Release -o ./publish --self-contained true -r win-x64

    - name: Publish (self-contained, single-file EXE)
      run: |
        cd WindowsSound
        dotnet publish -c Release -o ./publish-single -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:EnableCompressionInSingleFile=true

    - name: Zip multi-file publish
      run: |
        Compress-Archive -Path WindowsSound/publish/* -DestinationPath WindowsSound/DistributedAudio-win-x64.zip

    - name: List outputs
      if: always()
      run: |
        echo "Multi-file publish:"
        Get-ChildItem WindowsSound/publish | Select-Object Name,Length
        echo "Single-file publish:"
        Get-ChildItem WindowsSound/publish-single | Select-Object Name,Length

    - name: Upload multi-file publish (zip)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: windows-sound-publish-zip
        path: WindowsSound/DistributedAudio-win-x64.zip
        retention-days: 30
        if-no-files-found: warn

    - name: Upload single-file EXE
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: windows-sound-single-exe
        path: WindowsSound/publish-single/DistributedAudio.exe
        retention-days: 30
        if-no-files-found: warn
