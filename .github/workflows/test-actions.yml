name: Test Actions

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  test:
    name: Test if Actions work
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Simple test
      run: |
        echo "GitHub Actions is working!"
        echo "Current branch: ${{ github.ref_name }}"
        echo "Runner OS: ${{ runner.os }}"
        date

    - name: List project structure
      run: |
        echo "Project structure:"
        ls -la
        echo ""
        echo "Android projects:"
        ls -la Android* 2>/dev/null || echo "No Android projects found"
        echo ""
        echo "Windows project:"
        ls -la Windows* 2>/dev/null || echo "No Windows project found"
