name: Windows Sound CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'WindowsSound/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'WindowsSound/**'

jobs:
  build:
    name: Build Windows Sound
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: |
        cd WindowsSound
        dotnet restore

    - name: Build
      run: |
        cd WindowsSound
        dotnet build --configuration Release --no-restore

    - name: Run tests
      run: |
        cd WindowsSound
        dotnet test --no-build --verbosity normal

    - name: Publish
      run: |
        cd WindowsSound
        dotnet publish -c Release -o ./publish --self-contained true -r win-x64

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-sound
        path: WindowsSound/publish/

    - name: Create ZIP package
      run: |
        cd WindowsSound/publish
        7z a -tzip ../../DistributedAudio-Win-x64.zip *

    - name: Upload ZIP
      uses: actions/upload-artifact@v4
      with:
        name: windows-sound-zip
        path: DistributedAudio-Win-x64.zip

  release:
    name: Create Release
    needs: build
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: windows-sound-zip
        path: ./artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
        files: ./artifacts/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
